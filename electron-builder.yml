appId: com.umbrella.deadlock-db
productName: Umbrella Deadlock DB
copyright: Copyright © 2025

protocols:
  - name: Umbrella Deadlock DB Auth
    schemes:
      - umbrella-deadlock-db

# Drop unused `locales/*.pak` from the Electron bundle (large folder). Add codes if you ship more languages.
electronLanguages:
  - en-US

directories:
  buildResources: build
  output: dist

afterPack: ./scripts/after-pack-remove-license-files.cjs

files:
  - out/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish:
  provider: github
  owner: lilleke-rohus
  repo: UmbrellaDeadlockDB
  private: false
